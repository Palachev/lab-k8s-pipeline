apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pod-frontend
  template:
    metadata:
      labels:
        app: pod-frontend
    spec:
      containers:
        - name: pod-frontend
          image: pod-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
---
apiVersion: v1
kind: Service
metadata:
  name: pod-frontend
spec:
  type: NodePort
  selector:
    app: pod-frontend
  ports:
    - port: 80
      targetPort: 3000
      nodeport: 30080
